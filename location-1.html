<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location 1 | ArmyRiot</title>
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="challenge.css" />
</head>
<body data-stage="1" data-answer="12" data-next="index.html" data-success="Correct. Return to the tracker for the next location." data-blocked="Reach the first location from the tracker before opening this challenge.">
  <main class="shell">
    <section class="card">
      <div class="badge">Location 1</div>
      <h1>The Old Oak</h1>
      <p class="intro">You have reached the first checkpoint. Solve the question to unlock the next location.</p>

      <div class="question-box">
        <div class="question-label">Question</div>
        <p class="question">What is 7 + 5?</p>
      </div>

      <form data-challenge-form>
        <label class="sr-only" for="answer">Your answer</label>
        <input id="answer" name="answer" type="text" autocomplete="off" inputmode="text" placeholder="Enter your answer" />
        <button type="submit">Submit answer</button>
      </form>

      <p class="status" data-result></p>
      <p class="footnote" data-lock-note></p>

      <div class="footer">
        <span>Progress: 1 of 3</span>
        <span>Answer to continue the hunt</span>
      </div>
    </section>
  </main>

  <script src="challenge.js"></script>
</body>
</html>
